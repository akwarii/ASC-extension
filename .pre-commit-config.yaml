default_language_version:
  python: python3

exclude: ^(data|logs)

ci:
  autoupdate_schedule: monthly
  autoupdate_commit_msg: autoupdate pre-commit hooks
  autofix_commit_msg: autofix pre-commit hooks

repos:
  - repo: builtin
    hooks:
      - id: check-case-conflict
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements
      - id: name-tests-test
        args: ["--pytest-test-first"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.2
    hooks:
      - id: uv-lock
      - id: pip-compile
        args: [pyproject.toml, --no-annotate, --no-header, -o, requirements.txt, --quiet]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--number"]
        additional_dependencies:
          - mdformat-gfm
          - mdformat_frontmatter
          - mdformat-ruff

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --skip=*.ipynb,src/utils/data.py
          - --write-changes
